name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Determine release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.0.0 or v1.0.0-rc.1, got '${tag}'." >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release JAR
        run: ./gradlew clean build -PreleaseVersion="${{ steps.release.outputs.version }}" --no-daemon

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          mkdir -p release
          cp "build/libs/stats-importer-plugin-${version}.jar" "release/StatsImporter-${version}.jar"
          cd release
          sha256sum "StatsImporter-${version}.jar" > "StatsImporter-${version}.jar.sha256"

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release/* --clobber
          else
            gh release create "${tag}" release/* \
              --title "StatsImporter ${version}" \
              --generate-notes
          fi
