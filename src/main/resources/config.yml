import:
  # Aktiviert den automatischen Import über den Scheduler.
  enabled: true
  # Intervall für Timer-Imports in Sekunden.
  interval-seconds: 14400
  # Pfad zum Stats-Ordner (auto = automatisch erkennen).
  stats-dir: "auto"
  # Pfad zu usercache.json (auto = aus Server-Verzeichnis).
  usercache-path: "auto"
  # Pfad zu banned-players.json (auto = aus Server-Verzeichnis).
  banned-players-path: "auto"
  # Mindest-Spielzeit in Ticks (20 Ticks = 1 Sekunde).
  min-play-ticks: 72000
  # Sicherheitsgrenzen gegen falsche/leere Stats-Pfade (0 = deaktiviert).
  safety:
    # Mindestens gefundene *.json-Dateien im Stats-Ordner.
    min-processed-files: 1
    # Mindestens nach min-play-ticks übernommene Spieler.
    min-kept-players: 1
    # Maximal tolerierte kaputte Stats-JSONs (-1 = deaktiviert, 0 = keine tolerieren).
    max-parse-errors: 0
  # Anzahl Threads für Berechnung geänderter Spieler.
  worker-threads: 6
  # Maximale Anzahl gleichzeitiger, noch nicht fertiger Berechnungen.
  max-inflight-calculations: 3000
  # Batch-Größe für player_profile-Upserts.
  flush-profiles: 2000
  # Batch-Größe für geänderte Werte (stats + metrics).
  flush-changed: 800
  # Ignoriert Hashvergleich bei Timer-Lauf (erzwingt Neuberechnung).
  ignore-hash-on-timer: false
  # Aufbewahrung veröffentlichter Import-Snapshots (1 = nur aktueller Run bleibt).
  retention:
    # 1 hält nur den zuletzt aktiven Snapshot; 0 deaktiviert die automatische Löschung.
    keep-runs: 1
  # Name des globalen DB-Locks gegen parallele Importe.
  db-lock-name: "mc_stats_import"
  # Wartezeit auf DB-Lock in Sekunden.
  db-lock-timeout-seconds: 5
  # Aktiviert die Berechnung des "König"-Rankings.
  king-enabled: true
  # Metric-ID für die König-Gesamtpunkte.
  king-metric-id: "king"
  # Punkte für Platz 1, 2, 3 je Metric.
  king-points: [5, 3, 1]
  # UUIDs, die komplett vom Import ausgeschlossen werden.
  exclude-uuids: []
  # Optionaler Mojang-Resolver für fehlende/veraltete Namen.
  name-resolver:
    # Aktiviert den Resolver global.
    enabled: true
    # Maximal aufgelöste Spieler pro manuellem Resolver-Lauf.
    max-per-run: 1500
    # Resolver direkt nach Importlauf aktivieren/deaktivieren.
    after-import-enabled: true
    # Kleines Budget nach Importlauf, damit der Importthread nicht lange blockiert.
    after-import-max-per-run: 300
    # Separater Pflege-Worker für Namensauflösung.
    maintenance-enabled: true
    # Intervall des Pflege-Workers in Sekunden.
    maintenance-interval-seconds: 14400
    # Maximal aufgelöste Spieler pro Pflege-Lauf.
    maintenance-max-per-run: 500
    # Erneut prüfen, wenn letzter Check älter als X Tage ist (0 = nur fehlende/fallback Namen).
    refresh-days: 30
    # Pause zwischen Mojang-Requests in Millisekunden.
    sleep-ms: 150
    # Verbindungs-Timeout pro HTTP-Verbindung in Millisekunden.
    connect-timeout-ms: 5000
    # Request-Timeout pro Mojang-HTTP-Call in Millisekunden.
    request-timeout-ms: 5000

database:
  # DB-Host (MariaDB/MySQL).
  host: "127.0.0.1"
  # DB-Port.
  port: 3306
  # Datenbankname.
  name: "mg-stats"
  # Datenbank-Benutzer.
  user: "stats_user"
  # Datenbank-Passwort.
  password: "change-me"
  # Maximale Anzahl Verbindungen im Hikari-Pool.
  pool-max-size: 10
  # Timeout für neue DB-Verbindungen in Millisekunden.
  connection-timeout-ms: 10000

bootstrap:
  # Führt beim Start automatisch schema.sql aus, falls nötig.
  auto-schema: true
  # Prüft beim Start, ob benötigte Tabellen/Spalten vorhanden sind.
  verify-schema: true
  # Importiert metric-seeds, wenn Schema neu/fehlend war.
  seed-on-missing-schema: true
  # Importiert metric-seeds, wenn metric_def leer ist.
  seed-if-metric-def-empty: true
  # Synchronisiert metric_def/metric_source mit metric-seeds.yml bei jedem Start.
  sync-seeds: true
  # Seed-Datei (relativ zum Plugin-Ordner oder absoluter Pfad).
  seed-file: "metric-seeds.yml"
